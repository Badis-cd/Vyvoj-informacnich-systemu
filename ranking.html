<!DOCTYPE html>
<html lang="cs">
<head>
    <meta charset="UTF-8">
    <title>Wordle - Žebříček</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <div class="header">
        <h1>Globální Žebříček</h1>
        <div class="header-buttons">
            <button onclick="window.location.href='index.html'" class="btn-register">Zpět do hry</button>
        </div>
    </div>

    <div class="ranking-container">
        <table class="ranking-table">
            <thead>
                <tr>
                    <th>#</th>
                    <th>Hráč</th>
                    <th>Body</th>
                    <th>Winrate</th>
                    <th>Průměr pokusů</th>
                    <th>Oblíbený start</th>
                </tr>
            </thead>
            <tbody id="ranking-body">
                </tbody>
        </table>
    </div>

    <script>
        async function loadRanking() {
            try {
                const response = await fetch('ranking.php');
                const result = await response.json();

                if (result.status === 'success') {
                    const tbody = document.getElementById('ranking-body');
                    let html = '';

                    result.data.forEach((hrac, index) => {
                        let poradi = index + 1;
                        let tridaPoradi = poradi <= 3 ? `rank-${poradi}` : '';
                        
                        let hry = parseInt(hrac.odehrane_hry) || 0;
                        let vyhry = parseInt(hrac.vyhry) || 0;
                        let winrate = hry > 0 ? ((vyhry / hry) * 100).toFixed(1) + "%" : "0%";
                        let prumer = hrac.prumer_pokusu ? parseFloat(hrac.prumer_pokusu).toFixed(2) : "-";
                        let slovo = hrac.oblibene_slovo ? hrac.oblibene_slovo : "-";

                        html += `
                            <tr>
                                <td class="${tridaPoradi}">${poradi}.</td>
                                <td><strong>${hrac.jmeno}</strong></td>
                                <td class="text-correct"><strong>${hrac.celkove_body}</strong></td>
                                <td>${winrate}</td>
                                <td>${prumer}</td>
                                <td>${slovo}</td>
                            </tr>
                        `;
                    });

                    tbody.innerHTML = html;
                }
            } catch (error) {
                console.error("Chyba načítání žebříčku:", error);
            }
        }

        loadRanking();
    </script>
</body>
</html>
